name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build MoltenHub E2E image
        run: |
          git clone --depth 1 https://github.com/Molten-Bot/moltenhub /tmp/moltenhub
          if ! grep -R -q "register-plugin" /tmp/moltenhub/internal/api; then
            echo "moltenhub main does not include OpenClaw plugin routes yet; using feature branch for plugin e2e"
            git -C /tmp/moltenhub fetch --depth 1 origin codex/openclaw-realtime-plugin-registration
            git -C /tmp/moltenhub checkout FETCH_HEAD
          fi
          docker build -t moltenhub-openclaw-e2e:ci /tmp/moltenhub

      - name: Container E2E
        env:
          MOLTENHUB_IMAGE: moltenhub-openclaw-e2e:ci
        run: npm run test:e2e:container
